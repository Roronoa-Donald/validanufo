<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation Anufo</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f4f4f5;
            color: #18181b;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 700px;
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #1e293b;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }
        .collection-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .collection-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            text-decoration: none;
            color: #1e293b;
            font-weight: 500;
            transition: all 0.2 la;
        }
        .collection-item:hover {
            background: #f8fafc;
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn-export {
            background: #f1f5f9;
            color: #475569;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
            margin-left: 10px;
        }
        .btn-export:hover {
            background: #e2e8f0;
            color: #1e293b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Validation Anufo</h1>
        <div class="collection-list">
            {% for col in collections %}
            <div style="display: flex; align-items: center; gap: 10px;">
                <a href="/validate/{{ col }}" class="collection-item" style="flex: 1;">
                    <span>{{ col }}</span>
                </a>
                <a href="/export/{{ col }}" class="btn-export">📥 Export</a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
